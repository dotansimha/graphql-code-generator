  esm:
    name: Testing exports integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          standalone: true
          cache: true
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install packages
        run: pnpm i

      - name: Build
        run: pnpm build
        env:
          CI: true
      - name: Test ESM & CJS integrity
        run: pnpm bob check

  test:
    name:
      Unit Test on Node ${{matrix.node_version}} (${{matrix.os}}) and GraphQL
      v${{matrix.graphql_version}}
    runs-on: ubuntu-latest
    needs:
      - lint
      - prettier-check
      - esm
    strategy:
      matrix:
        os: [ubuntu-latest] # remove windows to speed up the tests
        node_version: [22, 24]
        graphql_version: [15, 16]
        include:
          - node-version: 22
            os: windows-latest
            graphql_version: 16
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          standalone: true
          cache: true
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{matrix.node_version}}
      - name: Install Dependencies to match graphql version
        run: pnpm i
      - name: Use GraphQL v${{matrix.graphql_version}}
        run: node ./scripts/match-graphql.js ${{matrix.graphql_version}}
      - name: Install Dependencies
        run: pnpm i --no-frozen-lockfile # no frozen-lockfile because `graphql` version is changed

      - name: Build
        run: pnpm build
      - name: Test
        # FIXME: Do not test `watcher.run.spec.ts` here because it is currently not working for Node22+ in Ubuntu
        run: pnpm test --exclude="**/tests/watcher.run.spec.ts"
        env:
          CI: true

  test-watcher:
    name:
      Watcher Unit Test on Node ${{matrix.node_version}} (${{matrix.os}}) and GraphQL
      v${{matrix.graphql_version}}
    runs-on: ubuntu-latest
    needs:
      - lint
      - prettier-check
      - esm
    strategy:
      matrix:
        os: [ubuntu-latest] # remove windows to speed up the tests
        node_version: [20]
        graphql_version: [15, 16]
        include:
          - node-version: 20
            os: windows-latest
            graphql_version: 16
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          standalone: true
          cache: true
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{matrix.node_version}}
      - name: Install Dependencies to match graphql version
        run: pnpm i
      - name: Use GraphQL v${{matrix.graphql_version}}
        run: node ./scripts/match-graphql.js ${{matrix.graphql_version}}
      - name: Install Dependencies
        run: pnpm i --no-frozen-lockfile # no frozen-lockfile because `graphql` version is changed

      - name: Build
        run: pnpm build
      - name: Test
        # FIXME: Merge `watcher.run.spec.ts` test to the above when it works for Node22+ in Ubuntu
        run: pnpm test packages/graphql-codegen-cli/tests/watcher.run.spec.ts
        env:
          CI: true


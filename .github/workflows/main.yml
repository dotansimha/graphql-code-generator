name: Testing

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--max_old_space_size=4096'
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Linting Check
    uses: the-guild-org/shared-config/.github/workflows/lint.yml@f4eea983237a44bb0ca19c3348dacbfdfcdbec23 # main
    with:
      script: pnpm ci:lint
      packageManager: pnpm
    secrets:
      githubToken: ${{ secrets.GITHUB_TOKEN }}
  prettier-check:
    name: 🧹 Prettier Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          standalone: true
          cache: true
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install packages
        run: pnpm install

      - name: Prettier Check
        run: pnpm prettier:check

  dev-tests-old:
    name: Validating dev-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        method:
          - 'cjs'
          - 'esm'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          standalone: true
          cache: true
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install packages
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          CI: true
      - name: Test dev-tests ${{matrix.method}}
        run: |
          pnpm run generate:examples:${{matrix.method}}
          git diff --exit-code -- dev-test/

  dev-tests:
    name: Examples - Normal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          standalone: true
          cache: true
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install packages
        # `side-effects-cache false` is set to avoid using pnpm cache for binary cache like Cypress'
        run: |
          pnpm config set side-effects-cache false --location project
          pnpm i

      - name: Build
        run: pnpm build
        env:
          CI: true
      - name: Generate and Diff Codegen Artifacts
        run: |
          EXAMPLE_TYPE=normal pnpm examples:codegen
          git diff --exit-code -- examples/
      - name: Build Examples
        run: |
          EXAMPLE_TYPE=normal pnpm examples:build
      - name: End2End Test Examples
        run: |
          EXAMPLE_TYPE=normal pnpm examples:test:end2end

  # TODO: Remove all SWC test setup and references as that has been moved to https://github.com/swc-project/plugins/tree/main/contrib/graphql-codegen-client-preset
